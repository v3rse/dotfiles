<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" id="hljs-light-theme">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" id="hljs-dark-theme" disabled>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
:root {
    --ivory: #FAF9F5; --paper: #FFFFFF; --slate: #141413;
    --clay: #D97757; --olive: #788C5D; --gold: #C4A43E;
    --g100: #F0EEE6; --g200: #E6E3DA; --g300: #D1CFC5; --g500: #87867F; --g700: #3D3D3A;
    --serif: ui-serif, Georgia, "Times New Roman", Times, serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    --bg: var(--ivory); --text: var(--slate);
    --border: var(--g300); --shadow: 0 12px 32px rgba(20,20,19,0.08);
}
[data-theme="dark"] {
    --bg: #141413; --text: #F0EEE6;
    --paper: #1e1e1c; --border: #3D3D3A;
    --g100: #1e1e1c; --g200: #2a2a28; --g300: #3D3D3A;
    --g500: #87867F; --g700: #D1CFC5; --slate: #F0EEE6;
    --shadow: 0 12px 32px rgba(0,0,0,0.3);
}
@media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
        --bg: #141413; --text: #F0EEE6;
        --paper: #1e1e1c; --border: #3D3D3A;
        --g100: #1e1e1c; --g200: #2a2a28; --g300: #3D3D3A;
        --g500: #87867F; --g700: #D1CFC5; --slate: #F0EEE6;
        --shadow: 0 12px 32px rgba(0,0,0,0.3);
    }
}

*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Top bar */
#top-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 2rem;border-bottom:1.5px solid var(--border);flex-shrink:0;background:var(--bg)}
.gallery-link{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--clay);text-decoration:none;font-weight:600}
.gallery-link:hover{color:var(--clay-d)} .gallery-link::before{content:"← "}
.header-center{text-align:center;flex:1}
h1{font-family:var(--serif);font-weight:500;font-size:22px;margin:0;color:var(--text);letter-spacing:-0.012em}
.subtitle{font-family:var(--mono);font-size:11px;color:var(--g500);text-transform:uppercase;letter-spacing:0.05em}
.theme-toggle{font-family:var(--mono);font-size:11px;color:var(--g500);cursor:pointer;background:none;border:none;padding:0;display:flex;align-items:center;gap:6px}
.theme-toggle:hover{color:var(--clay)}
.theme-toggle .icon{width:16px;height:16px;border:1.5px solid var(--g500);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px}

/* Board */
#board{display:flex;gap:16px;padding:1.5rem;flex-grow:1;overflow-x:auto;overflow-y:hidden}
.column{flex:1;min-width:280px;max-width:400px;background:var(--g100);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
.column-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.column-header h2{font-family:var(--serif);font-size:18px;font-weight:500;margin:0;color:var(--text);display:flex;align-items:center;gap:8px}
.column-header h2::before{content:"";width:10px;height:10px;border-radius:3px;flex-shrink:0}
.col-now h2::before{background:var(--clay)}
.col-next h2::before{background:var(--gold)}
.col-later h2::before{background:var(--g300)}
.col-cut h2::before{background:var(--g500)}
.col-count{font-family:var(--mono);font-size:12px;color:var(--g500);font-weight:600}
.col-estimate{font-family:var(--mono);font-size:10px;color:var(--g500);background:var(--paper);border:1px solid var(--border);padding:2px 8px;border-radius:4px}

.column-body{flex-grow:1;overflow-y:auto;padding:0 12px 12px;display:flex;flex-direction:column;gap:8px}

/* Cards */
.kanban-card{background:var(--paper);border:1.5px solid var(--border);border-radius:10px;padding:16px;transition:all 150ms ease;cursor:grab;user-select:none}
.kanban-card:hover{box-shadow:var(--shadow);border-color:var(--slate)}
.kanban-card.dragging{opacity:0.5;border-style:dashed}
.kanban-card .card-id{font-family:var(--mono);font-size:10px;color:var(--clay);font-weight:700;margin-bottom:4px;letter-spacing:0.03em}
.kanban-card .card-title{font-weight:600;font-size:14px;color:var(--text);margin-bottom:6px;line-height:1.4}
.kanban-card .card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--g100)}
.kanban-card .priority{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:0.03em;text-transform:uppercase}
.priority.S,.priority.critical{background:#fde8e8;color:#c53030}
.priority.M,.priority.high{background:#fef3c7;color:#b45309}
.priority.L,.priority.normal{background:#e8f5e9;color:#2e7d32}
.kanban-card .assignee{font-family:var(--mono);font-size:9px;color:var(--g500);background:var(--g100);padding:2px 6px;border-radius:4px}
.kanban-card .estimate{font-family:var(--mono);font-size:9px;color:var(--g500);margin-left:auto}

/* Code */
pre{background:var(--g200);padding:24px;border-radius:12px;overflow-x:auto;border:1.5px solid var(--border);font-size:13.5px;line-height:1.6;margin:2rem 0;position:relative;font-family:var(--mono);color:var(--text)}
pre code{font-family:var(--mono);color:var(--text)}
[data-theme="dark"] pre code.hljs{background:var(--g200)}
pre .copy-btn{position:absolute;top:8px;right:8px;font-family:var(--mono);font-size:10px;background:var(--paper);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;color:var(--g500);opacity:0;transition:opacity 150ms ease}
pre:hover .copy-btn{opacity:1}
pre .copy-btn:hover{color:var(--clay);border-color:var(--clay)}
.mermaid-container{position:relative;margin:4rem 0;background:var(--paper);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;height:500px}
.mermaid-controls{position:absolute;top:1rem;right:1rem;display:flex;gap:0.5rem;z-index:10}
.mermaid-btn{background:var(--bg);border:1.5px solid var(--border);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--g500);font-family:var(--sans)}
.mermaid-btn:hover{border-color:var(--clay);color:var(--clay)}
.mermaid{height:100%;width:100%;display:flex;justify-content:center;align-items:center}

/* Empty state */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--g500)}
.empty-state .icon{font-size:28px;margin-bottom:8px;opacity:0.5}
.empty-state p{font-family:var(--mono);font-size:11px;margin:0}

@media (max-width:900px){
    #board{flex-direction:column;overflow-y:auto;overflow-x:hidden}
    .column{max-width:none;min-height:200px}
    .column-body{max-height:300px}
}
@media print{
    #top-bar{display:none!important}
    body{background:#fff;color:#000;overflow:visible;height:auto}
    #board{overflow:visible;display:block}
    .column{border:1px solid #ccc;margin-bottom:1rem;max-width:none}
    .kanban-card{border:1px solid #ccc;box-shadow:none}
}
</style>
</head>
<body>
<div id="top-bar">
    <a href="index.html" class="gallery-link">Gallery</a>
    <div class="header-center">
        <h1>{{title}}</h1>
        <div class="subtitle">{{subtitle}}</div>
    </div>
    <button class="theme-toggle" id="theme-toggle"><span class="icon" id="theme-icon">◐</span> Theme</button>
</div>
<div id="board">
    <div class="column col-now" id="col-now">
        <div class="column-header"><h2>Now</h2><span class="col-count" id="count-now">0</span><span class="col-estimate" id="est-now">0 pts</span></div>
        <div class="column-body" id="body-now"></div>
    </div>
    <div class="column col-next" id="col-next">
        <div class="column-header"><h2>Next</h2><span class="col-count" id="count-next">0</span><span class="col-estimate" id="est-next">0 pts</span></div>
        <div class="column-body" id="body-next"></div>
    </div>
    <div class="column col-later" id="col-later">
        <div class="column-header"><h2>Later</h2><span class="col-count" id="count-later">0</span><span class="col-estimate" id="est-later">0 pts</span></div>
        <div class="column-body" id="body-later"></div>
    </div>
    <div class="column col-cut" id="col-cut">
        <div class="column-header"><h2>Cut</h2><span class="col-count" id="count-cut">0</span><span class="col-estimate" id="est-cut">0 pts</span></div>
        <div class="column-body" id="body-cut"></div>
    </div>
</div>

<script>
const rawContent = `{{content}}`;
const div = document.createElement('div');
div.innerHTML = marked.parse(rawContent);

// Extract cards from content
// Strategy: each h3 or h4 becomes a card, with the section content
// Or look for list items under h2 headings matching column names
const columns = { now: [], next: [], later: [], cut: [] };
const colMap = {
    now: ['now','current','active','doing','in progress','this week','today'],
    next: ['next','upcoming','soon','queued','backlog','this month'],
    later: ['later','someday','future','icebox','maybe'],
    cut: ['cut','wontfix','done','completed','closed','won\'t do']
};

// Try to find h2 headings that match column names
const h2s = div.querySelectorAll('h2');
h2s.forEach(h2 => {
    const text = h2.textContent.toLowerCase().trim();
    let colKey = null;
    for (const [key, patterns] of Object.entries(colMap)) {
        if (patterns.some(p => text.includes(p))) {
            colKey = key;
            break;
        }
    }
    if (!colKey) return;

    // Gather items: prefer table rows, then list items, then paragraphs
    const items = [];
    let sibling = h2.nextElementSibling;
    while (sibling && sibling.tagName !== 'H2') {
        if (sibling.tagName === 'TABLE') {
            sibling.querySelectorAll('tbody tr, tr').forEach(row => {
                const cells = row.querySelectorAll('td, th');
                if (cells.length >= 2) {
                    items.push({
                        id: cells[0].textContent.trim(),
                        title: cells[1].textContent.trim(),
                        priority: cells[2]?.textContent.trim() || '',
                        assignee: cells[3]?.textContent.trim() || '',
                        estimate: cells[4]?.textContent.trim() || ''
                    });
                }
            });
            break;
        } else if (sibling.tagName === 'UL' || sibling.tagName === 'OL') {
            sibling.querySelectorAll('li').forEach(li => {
                const text = li.textContent.trim();
                // Parse: "ID Title · Priority · Assignee · Estimate"
                const parts = text.split(/ [·•\-–] /);
                const id = parts[0] || '';
                const title = parts[1] || text;
                const priority = parts[2] || '';
                const assignee = parts[3] || '';
                const estimate = parts[4] || '';
                items.push({ id, title, priority, assignee, estimate });
            });
            break;
        } else if (sibling.tagName === 'P' || sibling.tagName === 'H3' || sibling.tagName === 'H4') {
            items.push({ id: '', title: sibling.textContent.trim(), priority: '', assignee: '', estimate: '' });
        }
        sibling = sibling.nextElementSibling;
    }
    columns[colKey] = items;
});

// If no column headings found, try alternative parsing
const allEmpty = Object.values(columns).every(arr => arr.length === 0);
if (allEmpty) {
    // Look for cards or sections
    const cards = [];
    const h3s = div.querySelectorAll('h3');
    h3s.forEach(h3 => {
        let desc = '';
        let sibling = h3.nextElementSibling;
        while (sibling && sibling.tagName !== 'H3' && sibling.tagName !== 'H2') {
            desc += sibling.textContent + ' ';
            sibling = sibling.nextElementSibling;
        }
        cards.push({ id: '', title: h3.textContent.trim(), desc: desc.trim(), priority: '', assignee: '', estimate: '' });
    });

    // Distribute: first 8 to now, next 8 to next, etc.
    const chunkSize = Math.ceil(cards.length / 4);
    columns.now = cards.slice(0, chunkSize);
    columns.next = cards.slice(chunkSize, chunkSize * 2);
    columns.later = cards.slice(chunkSize * 2, chunkSize * 3);
    columns.cut = cards.slice(chunkSize * 3);
}

// Parse priorities into S/M/L
function parsePriority(s) {
    const t = s.toLowerCase();
    if (/s|critical|p0|highest|blocker/i.test(t)) return 'S';
    if (/m|high|p1|major/i.test(t)) return 'M';
    if (/l|low|p2|normal|minor/i.test(t)) return 'L';
    return '';
}

function parseEstimate(s) {
    const match = (s||'').match(/(\d+)\s*(pt|point|pts|h|hr|day|d)/i);
    return match ? match[1] + match[2] : '';
}

// Render cards into columns
Object.entries(columns).forEach(([colKey, items]) => {
    const body = document.getElementById('body-' + colKey);
    const countEl = document.getElementById('count-' + colKey);
    const estEl = document.getElementById('est-' + colKey);

    if (items.length === 0) {
        body.innerHTML = '<div class="empty-state"><div class="icon">—</div><p>No items</p></div>';
        countEl.textContent = '0';
        estEl.textContent = '0 pts';
        return;
    }

    countEl.textContent = items.length;
    let totalPts = 0;

    body.innerHTML = items.map(item => {
        const priority = parsePriority(item.priority || '');
        const estimate = parseEstimate(item.estimate || item.desc || '');
        const pts = parseInt(estimate) || 0;
        if (!isNaN(pts)) totalPts += pts;

        return '<div class="kanban-card" draggable="true">' +
            (item.id ? '<div class="card-id">'+item.id+'</div>' : '') +
            '<div class="card-title">'+item.title+'</div>' +
            '<div class="card-meta">' +
                (priority ? '<span class="priority '+priority+'">'+priority+'</span>' : '') +
                (item.assignee ? '<span class="assignee">'+item.assignee+'</span>' : '') +
                (estimate ? '<span class="estimate">'+estimate+'</span>' : '') +
            '</div>' +
            '</div>';
    }).join('');

    estEl.textContent = totalPts ? totalPts + ' pts' : items.length + ' items';

    // Drag and drop
    body.querySelectorAll('.kanban-card').forEach(card => {
        card.addEventListener('dragstart', () => card.classList.add('dragging'));
        card.addEventListener('dragend', () => card.classList.remove('dragging'));
        card.addEventListener('touchstart', function(e) {
            this._touchY = e.touches[0].clientY;
        });
        card.addEventListener('touchmove', function(e) {
            const diff = e.touches[0].clientY - (this._touchY || 0);
            if (Math.abs(diff) > 10) this.style.transform = 'translateY('+diff+'px)';
        });
        card.addEventListener('touchend', function() {
            this.style.transform = '';
        });
    });
});

// Drag and drop between columns
document.querySelectorAll('.column-body').forEach(body => {
    body.addEventListener('dragover', e => { e.preventDefault(); body.style.background = 'var(--g200)'; });
    body.addEventListener('dragleave', () => { body.style.background = ''; });
    body.addEventListener('drop', function(e) {
        e.preventDefault();
        body.style.background = '';
        const card = document.querySelector('.kanban-card.dragging');
        if (card && body !== card.parentElement) {
            body.appendChild(card);
            updateColumnStats();
        }
    });
});

function updateColumnStats() {
    ['now','next','later','cut'].forEach(colKey => {
        const body = document.getElementById('body-'+colKey);
        const cards = body.querySelectorAll('.kanban-card');
        document.getElementById('count-'+colKey).textContent = cards.length;
        let pts = 0;
        cards.forEach(c => {
            const est = c.querySelector('.estimate');
            if (est) {
                const match = est.textContent.match(/(\d+)/);
                if (match) pts += parseInt(match[1]);
            }
        });
        document.getElementById('est-'+colKey).textContent = pts ? pts+' pts' : cards.length+' items';
        // Show/hide empty state
        if (cards.length === 0) {
            body.innerHTML = '<div class="empty-state"><div class="icon">—</div><p>No items</p></div>';
        }
    });
}

// Extract non-card content (prose, mermaid, code before column headings)
const contentSection = document.getElementById('content-section');
if (contentSection) {
    let leftoverHtml = '';
    let firstColH2 = null;
    for (const h of div.querySelectorAll('h2')) {
        const text = h.textContent.toLowerCase().trim();
        const isCol = Object.values(colMap).some(pats => pats.some(p => text.includes(p)));
        if (isCol) { firstColH2 = h; break; }
    }
    if (firstColH2) {
        let node = div.firstChild;
        while (node && node !== firstColH2) {
            leftoverHtml += node.outerHTML || node.textContent;
            node = node.nextSibling;
        }
    } else if (Object.values(columns).every(arr => arr.length === 0)) {
        leftoverHtml = div.innerHTML;
    }
    if (leftoverHtml.trim()) contentSection.innerHTML = leftoverHtml;
}

// Mermaid preprocessing, copy buttons, syntax highlighting — on content-section
if (contentSection && contentSection.innerHTML.trim()) {
    contentSection.querySelectorAll('pre code.language-mermaid').forEach((codeBlock, idx) => {
        const pre = codeBlock.parentElement;
        const diagram = codeBlock.textContent;
        const container = document.createElement('div');
        container.className = 'mermaid-container';
        container.innerHTML = '<div class="mermaid-controls"><button class="mermaid-btn" data-idx="'+idx+'">Reset</button><button class="mermaid-btn" data-idx="'+idx+'">Fit</button></div>';
        const mermaidDiv = document.createElement('div');
        mermaidDiv.className = 'mermaid'; mermaidDiv.id = 'mermaid-' + idx;
        mermaidDiv.textContent = diagram;
        mermaidDiv.dataset.diagram = diagram;
        container.appendChild(mermaidDiv);
        pre.replaceWith(container);
    });
    contentSection.querySelectorAll('pre:not(.mermaid-container pre)').forEach(pre => {
        if (pre.querySelector('.copy-btn')) return;
        const btn = document.createElement('button');
        btn.className = 'copy-btn'; btn.textContent = 'Copy';
        btn.onclick = () => {
            navigator.clipboard.writeText(pre.textContent.trim()).then(() => {
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 1500);
            });
        };
        pre.appendChild(btn);
    });
    hljs.highlightAll();
}

// Mermaid rendering (re-renders on theme change)
const zoomInstances = {};
const renderMermaidDiagrams = (theme) => {
    document.querySelectorAll('.mermaid').forEach(div => {
        div.textContent = div.dataset.diagram || '';
        div.removeAttribute('data-processed');
    });
    Object.values(zoomInstances).forEach(z => { try { z.destroy(); } catch(e) {} });
    for (const k in zoomInstances) delete zoomInstances[k];
    mermaid.initialize({ startOnLoad: false, theme: theme || 'neutral' });
    return mermaid.run({ querySelector: '.mermaid' }).then(() => {
        document.querySelectorAll('.mermaid svg').forEach((svg, idx) => {
            svg.style.height = '100%'; svg.style.width = '100%';
            zoomInstances[idx] = svgPanZoom(svg, {
                zoomEnabled: true, controlIconsEnabled: false,
                fit: true, center: true, minZoom: 0.1, maxZoom: 10
            });
        });
    });
};
renderMermaidDiagrams('neutral');
document.querySelectorAll('.mermaid-btn').forEach(btn => {
    btn.onclick = () => {
        const idx = parseInt(btn.dataset.idx);
        if (!zoomInstances[idx]) return;
        if (btn.textContent === 'Reset') { zoomInstances[idx].resetZoom(); zoomInstances[idx].center(); }
        if (btn.textContent === 'Fit') { zoomInstances[idx].fit(); zoomInstances[idx].center(); }
    };
});

// Highlight.js theme switching
const hljsLight = document.getElementById('hljs-light-theme');
const hljsDark = document.getElementById('hljs-dark-theme');
const setHljsTheme = t => {
    if (t === 'dark') { hljsLight.disabled = true; hljsDark.disabled = false; }
    else { hljsLight.disabled = false; hljsDark.disabled = true; }
};

// Theme
const themeToggle=document.getElementById('theme-toggle'),themeIcon=document.getElementById('theme-icon');
const getTheme=()=>localStorage.getItem('theme')||'auto';
const applyTheme=t=>{
    document.documentElement.removeAttribute('data-theme');
    const isDark = t === 'dark' || (t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
    if (isDark) {
        document.documentElement.setAttribute('data-theme','dark');
        setHljsTheme('dark');
        renderMermaidDiagrams('dark');
    } else {
        if(t==='light') document.documentElement.setAttribute('data-theme','light');
        setHljsTheme('light');
        renderMermaidDiagrams('neutral');
    }
    themeIcon.textContent=isDark?'◑':'◐';
};
applyTheme(getTheme());
themeToggle.onclick=()=>{
    const c=getTheme(),n=c==='auto'?'dark':c==='dark'?'light':'auto';
    localStorage.setItem('theme',n);applyTheme(n);
};
document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(e.key==='t'&&!e.ctrlKey&&!e.metaKey)themeToggle.click();
});
</script>
</body>
</html>
