<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" id="hljs-light-theme">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" id="hljs-dark-theme" disabled>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
:root {
    --ivory: #FAF9F5; --paper: #FFFFFF; --slate: #141413;
    --clay: #D97757; --clay-d: #B85C3E; --oat: #E3DACC; --olive: #788C5D;
    --g100: #F0EEE6; --g200: #E6E3DA; --g300: #D1CFC5; --g500: #87867F; --g700: #3D3D3A;
    --serif: ui-serif, Georgia, "Times New Roman", Times, serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    --bg: var(--ivory); --text: var(--slate); --header-text: var(--slate);
    --border: var(--g300); --shadow: 0 12px 32px rgba(20,20,19,0.08);
    --progress: 0%;
}
[data-theme="dark"] {
    --bg: #141413; --text: #F0EEE6; --header-text: #F0EEE6;
    --paper: #1e1e1c; --border: #3D3D3A;
    --g100: #1e1e1c; --g200: #2a2a28; --g300: #3D3D3A;
    --g500: #87867F; --g700: #D1CFC5; --slate: #F0EEE6;
    --shadow: 0 12px 32px rgba(0,0,0,0.3);
}
@media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
        --bg: #141413; --text: #F0EEE6; --header-text: #F0EEE6;
        --paper: #1e1e1c; --border: #3D3D3A;
        --g100: #1e1e1c; --g200: #2a2a28; --g300: #3D3D3A;
        --g500: #87867F; --g700: #D1CFC5; --slate: #F0EEE6;
        --shadow: 0 12px 32px rgba(0,0,0,0.3);
    }
}

*{box-sizing:border-box} html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased;display:flex;height:100vh;overflow:hidden}
#progress-bar{position:fixed;top:0;left:0;height:3px;background:var(--clay);z-index:1000;transition:width 80ms linear;width:var(--progress)}

/* Sidebar — "On this page" style */
aside{width:280px;background:var(--bg);border-right:1.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;padding:1.5rem 0;overflow:hidden}
.sidebar-header{padding:0 1.5rem 1rem;border-bottom:1px solid var(--border)}
.gallery-link{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--clay);text-decoration:none;margin-bottom:0.75rem;font-weight:600}
.gallery-link:hover{color:var(--clay-d)} .gallery-link::before{content:"←"}
.sidebar-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--g500);margin-bottom:12px}
#toc-nav{flex-grow:1;overflow-y:auto;padding:0.5rem 0.75rem}
#toc-nav a{display:block;font-size:13px;padding:8px 14px;margin-bottom:2px;border-radius:8px;text-decoration:none;color:var(--g700);transition:all 150ms ease;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#toc-nav a:hover{background:var(--g100);color:var(--clay)}
#toc-nav a.active{background:var(--paper);border:1.5px solid var(--slate);color:var(--slate);font-weight:600}
#toc-nav a.h3-link{padding-left:28px;font-size:12px;color:var(--g500)}
#toc-nav a.h3-link:hover{color:var(--clay)}
.sidebar-footer{padding:0.75rem 1.5rem 0;border-top:1px solid var(--border);margin-top:auto}
.theme-toggle{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--g500);cursor:pointer;background:none;border:none;padding:0;width:100%}
.theme-toggle:hover{color:var(--clay)}
.theme-toggle .icon{width:18px;height:18px;border:1.5px solid var(--g500);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.kb-hint{font-family:var(--mono);font-size:9px;color:var(--g500);opacity:0.7;margin-left:auto}

/* Files read strip */
.files-read{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.file-tag{font-family:var(--mono);font-size:11px;background:var(--g100);border:1px solid var(--border);border-radius:6px;padding:2px 8px;color:var(--g500)}
.file-tag::before{content:"📄 ";font-size:10px}

main{flex-grow:1;overflow-y:auto;padding:3rem 2rem 6rem}
.wrap{max-width:1000px;margin:0 auto}
h1{font-family:var(--serif);font-weight:500;font-size:clamp(28px,4.5vw,48px);line-height:1.1;letter-spacing:-0.02em;margin-bottom:0.5rem;color:var(--header-text)}
.subtitle{font-family:var(--mono);font-size:12px;color:var(--g500);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2rem}
.tldr{background:var(--paper);border:1.5px solid var(--slate);border-left:4px solid var(--clay);border-radius:10px;padding:20px 24px;margin-bottom:3rem;font-size:15px;line-height:1.65;box-shadow:var(--shadow)}
.tldr strong:first-child{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--clay);display:block;margin-bottom:8px}

h2{font-family:var(--serif);font-weight:500;font-size:26px;margin-top:4rem;margin-bottom:1rem;letter-spacing:-0.012em;color:var(--header-text);scroll-margin-top:2rem;display:flex;align-items:baseline;gap:12px}
h2::before{content:"•";color:var(--clay);font-size:1.1em}
h3{font-family:var(--serif);font-weight:500;font-size:19px;margin-top:2.5rem;margin-bottom:0.75rem;color:var(--header-text);scroll-margin-top:2rem}

/* Section numbering */
.step-num{font-family:var(--mono);font-size:13px;color:var(--clay);font-weight:600;background:var(--g100);padding:2px 8px;border-radius:4px;margin-right:8px}

/* Collapsible step */
details.step{margin:1.25rem 0;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;background:var(--paper)}
details.step[open]{box-shadow:var(--shadow)}
details.step>summary{padding:16px 20px;cursor:pointer;font-weight:600;color:var(--header-text);background:var(--g100);font-size:15px;user-select:none;list-style:none;display:flex;align-items:center;gap:10px}
details.step>summary::-webkit-details-marker{display:none}
details.step>summary::before{content:"→";font-size:12px;transition:transform 200ms ease;color:var(--clay);display:inline-block;flex-shrink:0}
details.step[open]>summary::before{transform:rotate(90deg)}
details.step .step-body{padding:8px 20px 20px;border-top:1px solid var(--g100)}

/* Gotchas callout */
.callout{background:var(--paper);border:1.5px solid var(--clay);border-left:4px solid var(--clay);border-radius:10px;padding:20px 24px;margin:2rem 0}
.callout h4{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--clay);margin:0 0 10px}
.callout ul{margin:0;padding-left:20px;font-size:14.5px;color:var(--g700)}
.callout li{margin-bottom:6px}

/* FAQ */
.faq-item{margin:1rem 0;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;background:var(--paper)}
.faq-item summary{padding:14px 20px;cursor:pointer;font-weight:600;color:var(--header-text);background:var(--g100);font-size:14.5px;user-select:none;list-style:none;display:flex;align-items:center;gap:10px}
.faq-item summary::-webkit-details-marker{display:none}
.faq-item summary::before{content:"?";color:var(--clay);font-weight:700;flex-shrink:0}
.faq-item .faq-answer{padding:0 20px 16px;font-size:14px;color:var(--g700);line-height:1.6}

/* Code blocks */
pre{background:var(--g100);padding:24px;border-radius:12px;overflow-x:auto;border:1.5px solid var(--border);font-size:13.5px;line-height:1.6;margin:1.5rem 0;position:relative}
pre .copy-btn{position:absolute;top:8px;right:8px;font-family:var(--mono);font-size:10px;background:var(--paper);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;color:var(--g500);opacity:0;transition:opacity 150ms ease}
pre:hover .copy-btn{opacity:1}
pre .copy-btn:hover{color:var(--clay);border-color:var(--clay)}
[data-theme="dark"] pre code.hljs { background: var(--g100); }

/* Config block */
.config-block{background:var(--g100);border:1.5px solid var(--border);border-radius:10px;padding:20px;margin:1.5rem 0}
.config-block h5{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--g500);margin:0 0 10px}

/* Tip badge */
.tip{display:inline-flex;align-items:flex-start;gap:10px;background:var(--paper);border:1.5px solid var(--olive);border-radius:10px;padding:16px 20px;margin:1.5rem 0;font-size:14px;color:var(--g700);line-height:1.6}
.tip::before{content:"★";color:var(--olive);font-size:16px;flex-shrink:0;margin-top:2px}

/* Mermaid */
.mermaid-container{position:relative;margin:3rem 0;background:var(--paper);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;height:500px}
.mermaid-controls{position:absolute;top:1rem;right:1rem;display:flex;gap:0.5rem;z-index:10}
.mermaid-btn{background:var(--bg);border:1.5px solid var(--border);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--g500);font-family:var(--sans)}
.mermaid-btn:hover{border-color:var(--clay);color:var(--clay)}
.mermaid{height:100%;width:100%;display:flex;justify-content:center;align-items:center}

/* Tables */
table{width:100%;border-collapse:collapse;margin:2rem 0;font-size:14.5px}
th{text-align:left;padding:14px;border-bottom:2.5px solid var(--slate);font-weight:600;color:var(--header-text)}
td{padding:14px;border-bottom:1.5px solid var(--border)}
tr:hover td{background:var(--g100)}

/* Back to top */
#back-to-top{position:fixed;bottom:2rem;right:2rem;width:44px;height:44px;border-radius:50%;background:var(--paper);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--g500);opacity:0;transform:translateY(10px);transition:all 200ms ease;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
#back-to-top.visible{opacity:1;transform:translateY(0)}
#back-to-top:hover{border-color:var(--clay);color:var(--clay)}

@media print{aside,#progress-bar,#back-to-top,.copy-btn{display:none!important}body{display:block;height:auto;overflow:visible;background:#fff;color:#000}main{padding:0;overflow:visible}.wrap{max-width:100%}@page{margin:2cm}}
@media (max-width:768px){body{flex-direction:column;height:auto;overflow:visible}aside{width:100%;height:auto;border-right:none;border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:100;padding:1rem}.sidebar-header{border-bottom:none;padding-bottom:0.5rem}#toc-nav{display:none}.sidebar-footer{display:none}main{padding:2rem 1.5rem;overflow:visible}}
</style>
</head>
<body>
<div id="progress-bar"></div>
<aside>
    <div class="sidebar-header">
        <a href="index.html" class="gallery-link">← Gallery</a>
        <div class="sidebar-label">On this page</div>
    </div>
    <nav id="toc-nav"></nav>
    <div class="sidebar-footer">
        <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode (t)">
            <span class="icon" id="theme-icon">◐</span> Theme
            <span class="kb-hint">t</span>
        </button>
    </div>
</aside>
<main id="main-content">
    <div class="wrap">
        <header>
            <div class="subtitle">{{subtitle}}</div>
            <h1>{{title}}</h1>
        </header>
        <div id="content"></div>
    </div>
</main>
<button id="back-to-top" title="Back to top">↑</button>

<script>
const rawContent = `{{content}}`;
const contentDiv = document.getElementById('content');
contentDiv.innerHTML = marked.parse(rawContent);

// Extract TL;DR (first paragraph after h1 becomes tldr)
const firstP = contentDiv.querySelector('p');
if (firstP && firstP === contentDiv.firstElementChild && firstP.textContent.trim()) {
    const tldr = document.createElement('div');
    tldr.className = 'tldr';
    tldr.innerHTML = '<strong>TL;DR</strong>' + firstP.innerHTML;
    firstP.replaceWith(tldr);
}

// Generate TOC
const tocNav = document.getElementById('toc-nav');
contentDiv.querySelectorAll('h2').forEach((h, i) => {
    const id = h.id || 'section-' + i;
    h.id = id;
    const a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h.textContent;
    tocNav.appendChild(a);
});
contentDiv.querySelectorAll('h3').forEach((h, i) => {
    const id = h.id || 'h3-' + i;
    h.id = id;
    const a = document.createElement('a');
    a.href = '#' + id;
    a.className = 'h3-link';
    a.textContent = h.textContent;
    tocNav.appendChild(a);
});

// Enhance code blocks with copy
contentDiv.querySelectorAll('pre:not(.mermaid-container pre)').forEach(pre => {
    if (pre.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.onclick = () => {
        navigator.clipboard.writeText(pre.textContent.trim()).then(() => {
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 1500);
        });
    };
    pre.appendChild(btn);
});

// Mermaid
contentDiv.querySelectorAll('pre code.language-mermaid').forEach((codeBlock, idx) => {
    const pre = codeBlock.parentElement;
    const diagram = codeBlock.textContent;
    const container = document.createElement('div');
    container.className = 'mermaid-container';
    const controls = document.createElement('div');
    controls.className = 'mermaid-controls';
    controls.innerHTML = '<button class="mermaid-btn" data-idx="'+idx+'">Reset</button><button class="mermaid-btn" data-idx="'+idx+'">Fit</button>';
    const mermaidDiv = document.createElement('div');
    mermaidDiv.className = 'mermaid';
    mermaidDiv.id = 'mermaid-' + idx;
    mermaidDiv.textContent = diagram;
    mermaidDiv.dataset.diagram = diagram;
    container.appendChild(controls);
    container.appendChild(mermaidDiv);
    pre.replaceWith(container);
});

// Mermaid rendering (reusable — called on load and on theme change)
const zoomInstances = {};
const renderMermaidDiagrams = (theme) => {
    document.querySelectorAll('.mermaid').forEach(div => {
        div.textContent = div.dataset.diagram || '';
        div.removeAttribute('data-processed');
    });
    Object.values(zoomInstances).forEach(z => { try { z.destroy(); } catch(e) {} });
    for (const k in zoomInstances) delete zoomInstances[k];
    mermaid.initialize({ startOnLoad: false, theme: theme || 'neutral' });
    return mermaid.run({ querySelector: '.mermaid' }).then(() => {
        document.querySelectorAll('.mermaid svg').forEach((svg, idx) => {
            svg.style.height='100%';svg.style.width='100%';
            zoomInstances[idx] = svgPanZoom(svg, {zoomEnabled:true,controlIconsEnabled:false,fit:true,center:true,minZoom:0.1,maxZoom:10});
        });
    });
};
renderMermaidDiagrams('neutral');

document.querySelectorAll('.mermaid-btn').forEach(btn => {
    btn.onclick = () => {
        const idx = parseInt(btn.dataset.idx);
        if (!zoomInstances[idx]) return;
        if (btn.textContent==='Reset'){zoomInstances[idx].resetZoom();zoomInstances[idx].center();}
        if (btn.textContent==='Fit'){zoomInstances[idx].fit();zoomInstances[idx].center();}
    };
});

// Progress bar
const main = document.getElementById('main-content');
main.addEventListener('scroll', () => {
    const pct = main.scrollHeight>main.clientHeight ? (main.scrollTop/(main.scrollHeight-main.clientHeight))*100 : 0;
    document.documentElement.style.setProperty('--progress', pct+'%');
});

// Back to top
const btt = document.getElementById('back-to-top');
main.addEventListener('scroll', () => btt.classList.toggle('visible', main.scrollTop>800));
btt.onclick = () => main.scrollTo({top:0,behavior:'smooth'});

// Active section
const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
        if(e.isIntersecting){
            document.querySelectorAll('#toc-nav a.active').forEach(a=>a.classList.remove('active'));
            const t = document.querySelector('#toc-nav a[href="#'+e.target.id+'"]');
            if(t)t.classList.add('active');
        }
    });
},{threshold:0.2,rootMargin:'-80px 0px -20% 0px'});
contentDiv.querySelectorAll('h2,h3').forEach(h=>obs.observe(h));

// Syntax highlighting
hljs.highlightAll();
const hljsLight = document.getElementById('hljs-light-theme');
const hljsDark = document.getElementById('hljs-dark-theme');
const setHljsTheme = t => {
    if (t === 'dark') { hljsLight.disabled = true; hljsDark.disabled = false; }
    else { hljsLight.disabled = false; hljsDark.disabled = true; }
};

// Theme
const themeToggle=document.getElementById('theme-toggle'),themeIcon=document.getElementById('theme-icon');
const getTheme=()=>localStorage.getItem('theme')||'auto';
const applyTheme=t=>{
    document.documentElement.removeAttribute('data-theme');
    const isDark = t==='dark'||(t==='auto'&&window.matchMedia('(prefers-color-scheme:dark)').matches);
    if(isDark){
        document.documentElement.setAttribute('data-theme','dark');
        setHljsTheme('dark');
        renderMermaidDiagrams('dark');
    }else{
        if(t==='light')document.documentElement.setAttribute('data-theme','light');
        setHljsTheme('light');
        renderMermaidDiagrams('neutral');
    }
    themeIcon.textContent=isDark?'◑':'◐';
};
applyTheme(getTheme());
themeToggle.onclick=()=>{
    const c=getTheme(),n=c==='auto'?'dark':c==='dark'?'light':'auto';
    localStorage.setItem('theme',n);applyTheme(n);
};

document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(e.key==='t'&&!e.ctrlKey&&!e.metaKey)themeToggle.click();
});
</script>
</body>
</html>
