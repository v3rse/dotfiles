set -g default-terminal "tmux-256color"
set-option -g focus-events on
set-option -sa terminal-overrides ',xterm-256color:RGB'

# turn on mouse support
set-option -g mouse on

# update prefix hotkey
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# panes
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# windows
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind-key -n S-Up set-option -g status
bind-key -n S-Down set-option -g status

# session
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

# window base index
set -g base-index 1

# easy config reload
bind-key X source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# buffer mode
setw -g mode-keys vi

# copy and paste
if-shell 'uname | grep -q Darwin' \
  'set -g @copy_cmd "pbcopy"' \
  'set -g @copy_cmd "xclip -selection clipboard -in"'

set -s set-clipboard on
bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@copy_cmd}"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "#{@copy_cmd}"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@copy_cmd}"

set-window-option -g xterm-keys on

# sensible defaults
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g aggressive-resize on
set -g status-keys emacs

# emacs / terminal key passthrough
set -g allow-passthrough on
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# style
set-option -g status-position bottom
set -g status-justify centre
set-option -g status-style fg=colour255,bg=default
set-window-option -g window-status-style fg="#666666",bg=default
set-window-option -g window-status-current-style fg=colour1,bg=default

set-option -g message-style fg=colour255,bg=colour8,bright
set -g status-left " "

setw -g window-status-format         ' #W '
setw -g window-status-current-format ' #W '
set -g status-right " "

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'ofirgall/tmux-window-name'

run '~/.tmux/plugins/tpm/tpm'
